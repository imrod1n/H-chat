<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="container bg-primary text-white p-5 d-flex">
        <img class="logo" src="Images/logo.png" alt="">
        <h1 class="caption">H-chat</h1>
    </header>

    <main class="container users p-3">
        <div class="d-flex contact mt-5 bg-light">
            <img class="rounded-circle" style="width: 8rem; height: 8rem;" src="Images/empty.jpg" alt="empty photo" >
            <div style="margin-left: 2rem;">
                <h4>Степан</h4>
                <p>Ты не забыл про день рождения Андрея?</p>
                <a href="/chat.html" class="btn btn-primary">В чат</a>
              </div>
        </div>
        <div class="d-flex contact mt-5 bg-light">
            <img class="rounded-circle" style="width: 8rem; height: 8rem;" src="Images/empty.jpg" alt="empty photo" >
            <div style="margin-left: 2rem;">
                <h4>Стас</h4>
                <p>Да</p>
                <a href="#" class="btn btn-primary">В чат</a>
              </div>
        </div>
        <div class="d-flex group mt-5 bg-light">
            <img class="rounded-circle" style="width: 8rem; height: 8rem;" src="Images/empty.jpg" alt="empty photo" >
            <div style="margin-left: 2rem;">
                <h4>ИСП-308</h4>
                <p>Ага</p>
                <a href="#" class="btn btn-primary">В чат</a>
              </div>
        </div>
    </main>
</body>
</html>
